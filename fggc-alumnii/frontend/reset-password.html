<!DOCTYPE html>
<html lang="en">

<head>
    <script>try{var t=localStorage.getItem('fggc-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Reset Password | FGGC Gboko FCT Chapter Alumni</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="apple-touch-icon" href="images/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <div class="page-hero" style="min-height:100dvh;display:flex;flex-direction:column;">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>

        <nav class="nav-pill nav-pill--dark">
            <a href="index.html" class="nav-logo">
                <img src="images/logo.png" alt="FGGC Logo" class="nav-logo-img">
                FGGC Gboko Alumni FCT</a>
        </nav>

        <div
            style="flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative;z-index:2;">
            <div class="glass-card--dark form-container--dark">
                <h2 style="margin-bottom:0.3rem;">Set New Password</h2>
                <p id="reset-desc" style="color:rgba(255,255,255,0.5);font-size:0.85rem;margin-bottom:1.5rem;">Enter
                    your new password below.</p>

                <p id="reset-error"
                    style="color:#ff8a80;text-align:center;margin-bottom:0.85rem;font-size:0.88rem;min-height:1.2em;">
                </p>
                <p id="reset-success"
                    style="color:#00e676;text-align:center;margin-bottom:0.85rem;font-size:0.88rem;min-height:1.2em; display:none;">
                </p>

                <form id="reset-password-form">
                    <div class="form-group">
                        <label for="reset-password">New Password</label>
                        <input type="password" id="reset-password" placeholder="Enter new password" required
                            minlength="8">
                    </div>
                    <div class="form-group">
                        <label for="reset-confirm">Confirm Password</label>
                        <input type="password" id="reset-confirm" placeholder="Re-enter new password" required
                            minlength="8">
                    </div>
                    <button type="submit" id="reset-btn" class="btn btn-primary"
                        style="width:100%;margin-top:0.5rem;">Update Password</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <!-- Mobile bottom navigation -->
    <nav class="mobile-bottom-nav" aria-label="Mobile navigation">
        <a href="index.html" class="mobile-nav-tab" data-page="index">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Home</span>
        </a>
        <a href="about.html" class="mobile-nav-tab" data-page="about">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span>About</span>
        </a>
        <a href="gallery.html" class="mobile-nav-tab" data-page="gallery">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <span>Gallery</span>
        </a>
        <a href="news.html" class="mobile-nav-tab" data-page="news">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <span>News</span>
        </a>
        <a href="login.html" class="mobile-nav-tab" data-page="login">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Login</span>
        </a>
    </nav>
    <script>
    (function() {
        var page = window.location.pathname.split('/').pop().replace('.html', '') || 'index';
        try {
            var tab = document.querySelector('.mobile-nav-tab[data-page="' + page + '"]');
            if (tab) tab.classList.add('active');
        } catch(e) {}
    })();
    </script>
    <!-- Dark mode toggle -->
    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="Switch to dark mode">
        <svg class="theme-icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="theme-icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
    <script src="js/theme.js"></script>
</body>
