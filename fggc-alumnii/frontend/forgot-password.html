<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | FGGC Gboko FCT Chapter Alumni</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <div class="page-hero" style="min-height:100vh;display:flex;flex-direction:column;">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>

        <nav class="nav-pill nav-pill--dark">
            <a href="index.html" class="nav-logo">FGGC Gboko Alumni FCT</a>
            <div class="auth-buttons">
                <a href="login.html" class="btn btn-secondary">Login</a>
            </div>
        </nav>

        <div
            style="flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative;z-index:2;">
            <div class="glass-card--dark form-container--dark">
                <h2 style="margin-bottom:0.3rem;">Forgot Password</h2>
                <p style="color:rgba(255,255,255,0.5);font-size:0.85rem;margin-bottom:1.5rem;">Enter your email to
                    receive a reset link.</p>

                <p id="forgot-error"
                    style="color:#ff8a80;text-align:center;margin-bottom:0.85rem;font-size:0.88rem;min-height:1.2em;">
                </p>
                <p id="forgot-success"
                    style="color:#00e676;text-align:center;margin-bottom:0.85rem;font-size:0.88rem;min-height:1.2em; display:none;">
                </p>

                <form id="forgot-password-form">
                    <div class="form-group">
                        <label for="forgot-email">Email Address</label>
                        <input type="email" id="forgot-email" placeholder="you@example.com" required>
                    </div>
                    <button type="submit" id="forgot-btn" class="btn btn-primary"
                        style="width:100%;margin-top:0.5rem;">Send Reset Link &rarr;</button>
                </form>

                <p style="text-align:center;margin-top:1.25rem;font-size:0.85rem;color:rgba(255,255,255,0.45);">
                    Remembered it? <a href="login.html" style="color:var(--sky);">Log in here</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
