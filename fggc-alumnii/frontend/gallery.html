</head>

<body>

    <nav class="nav-pill nav-pill--light">
        <a href="index.html" class="nav-logo">
            <img src="images/logo.png" alt="FGGC Logo" class="nav-logo-img">
            FGGC Gboko Alumni FCT
        </a>
        <ul class="nav-links-list">
            <li><a href="index.html" class="nav-link">Home</a></li>
            <li><a href="about.html" class="nav-link">About</a></li>

            <li><a href="gallery.html" class="nav-link active">Gallery</a></li>
        </ul>
        <div class="auth-buttons" id="auth-links"></div>
    </nav>

    <main>
        <div class="page-heading">
            <h1>Memories &amp; Events</h1>
            <p>A collection of our proudest moments. Click any image to view full size.</p>
        </div>

        <!-- #gallery-container preserved — JS injects .gallery-item divs here -->
        <div id="gallery-container" class="gallery-grid">
            <p>Loading gallery&hellip;</p>
        </div>
    </main>

    <!-- Lightbox — all IDs preserved exactly -->
    <div id="lightbox">
        <button id="lightbox-close">&times;</button>
        <img id="lightbox-img" src="" alt="" style="max-width:100%;max-height:80vh;">
        <video id="lightbox-video" controls style="max-width:100%;max-height:80vh;display:none;"></video>
        <div id="lightbox-caption"></div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/animations.js"></script>
    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxVideo = document.getElementById('lightbox-video');
        const lightboxCaption = document.getElementById('lightbox-caption');

        function openLightbox(item) {
            if (item.type === 'video') {
                lightboxImg.style.display = 'none';
                lightboxVideo.src = API_URL + item.url;
                lightboxVideo.style.display = 'block';
            } else {
                lightboxVideo.style.display = 'none';
                lightboxImg.src = API_URL + item.url;
                lightboxImg.style.display = 'block';
            }
            lightboxCaption.textContent = item.caption || '';
            lightboxCaption.style.display = item.caption ? 'block' : 'none';
            lightbox.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('open');
            lightboxImg.src = '';
            lightboxVideo.pause();
            lightboxVideo.src = '';
            document.body.style.overflow = '';
        }

        document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });

        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('gallery-container');
            try {
                const images = await api.get('/gallery');
                if (images.length === 0) {
                    container.innerHTML = '<p>No images available in the gallery yet.</p>';
                    return;
                }
                container.innerHTML = images.map((img, i) => `
                <div class="gallery-item" data-index="${i}">
                    ${img.type === 'video'
                        ? `<div class="gallery-video-thumb">
                               <video src="${API_URL}${img.url}" muted preload="metadata"></video>
                               <div class="gallery-play-btn">
                                   <svg viewBox="0 0 24 24" width="40" height="40">
                                       <circle cx="12" cy="12" r="12" fill="rgba(255,255,255,0.92)"/>
                                       <polygon points="10,7 19,12 10,17" fill="#0D2B4E"/>
                                   </svg>
                               </div>
                               <span class="gallery-video-badge">VIDEO</span>
                           </div>`
                        : `<img src="${API_URL}${img.url}" alt="${img.caption || 'Alumni Event'}">`
                    }
                    ${img.caption ? `<div class="gal-caption">${img.caption}</div>` : ''}
                </div>
            `).join('');

                container.querySelectorAll('.gallery-item[data-index]').forEach((el, i) => {
                    el.addEventListener('click', () => openLightbox(images[i]));
                });
            } catch (error) {
                container.innerHTML = '<p>Failed to load gallery images.</p>';
            }
        });
    </script>

    <script>
    (function() {

    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="Switch to dark mode">
