<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Sign Up | FGGC Gboko FCT Chapter Alumni</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- Full dark hero background -->
    <div class="page-hero" style="min-height:100dvh;display:flex;flex-direction:column;">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>

        <nav class="nav-pill nav-pill--dark">
            <a href="index.html" class="nav-logo">
                <img src="images/logo.png" alt="FGGC Logo" class="nav-logo-img">
                FGGC Gboko Alumni FCT</a>
            <div class="auth-buttons" id="auth-links"></div>
        </nav>

        <div
            style="flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative;z-index:2;">
            <div class="glass-card--dark form-container--dark" style="max-width:440px;">
                <h2 style="margin-bottom:0.3rem;">Join the Community</h2>
                <p style="color:rgba(255,255,255,0.5);font-size:0.85rem;margin-bottom:1.5rem;">Create your alumni
                    account</p>

                <p id="error-message"
                    style="color:#ff8a80;text-align:center;margin-bottom:0.85rem;font-size:0.88rem;min-height:1.2em;">
                </p>

                <form id="signup-form">
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.85rem;">
                        <div class="form-group">
                            <label for="first_name">First Name</label>
                            <input type="text" id="first_name" required>
                        </div>
                        <div class="form-group">
                            <label for="last_name">Last Name</label>
                            <input type="text" id="last_name" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label for="graduation_year">Graduation Year</label>
                        <input type="number" id="graduation_year" required min="1970" max="2030"
                            placeholder="e.g. 2010">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem;">Create Account
                        &rarr;</button>
                </form>

                <p style="text-align:center;margin-top:1.25rem;font-size:0.85rem;color:rgba(255,255,255,0.45);">
                    Already have an account? <a href="login.html" style="color:var(--sky);">Login here</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/animations.js"></script>
    <!-- Mobile bottom navigation -->
    <nav class="mobile-bottom-nav" aria-label="Mobile navigation">
        <a href="index.html" class="mobile-nav-tab" data-page="index">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Home</span>
        </a>
        <a href="about.html" class="mobile-nav-tab" data-page="about">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span>About</span>
        </a>
        <a href="gallery.html" class="mobile-nav-tab" data-page="gallery">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <span>Gallery</span>
        </a>
        <a href="news.html" class="mobile-nav-tab" data-page="news">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <span>News</span>
        </a>
        <a href="login.html" class="mobile-nav-tab" data-page="login">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Login</span>
        </a>
    </nav>
    <script>
    (function() {
        var page = window.location.pathname.split('/').pop().replace('.html', '') || 'index';
        try {
            var tab = document.querySelector('.mobile-nav-tab[data-page="' + page + '"]');
            if (tab) tab.classList.add('active');
        } catch(e) {}
    })();
    </script>
</body>

</html>
