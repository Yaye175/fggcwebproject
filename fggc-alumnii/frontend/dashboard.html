<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Dashboard | FGGC Gboko FCT Chapter Alumni</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <nav class="nav-pill nav-pill--light">
        <a href="index.html" class="nav-logo">
            <img src="images/logo.png" alt="FGGC Logo" class="nav-logo-img">
            FGGC Gboko Alumni FCT
        </a>
        <ul class="nav-links-list">
            <li><a href="index.html" class="nav-link">Home</a></li>
            <li><a href="dashboard.html" class="nav-link active">Dashboard</a></li>
        </ul>
        <div class="auth-buttons" id="auth-links"></div>
    </nav>

    <main>
        <div class="page-heading">
            <h1>My Dashboard</h1>
            <p>Your membership overview for <span id="current-year">2026</span>.</p>
        </div>

        <!-- Stat cards row -->
        <div class="stat-card-grid">
            <!-- Profile card -->
            <div class="glass-card" style="padding:1.5rem;">
                <div
                    style="color:var(--sky);font-size:0.7rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.5rem;">
                    Profile</div>
                <div style="margin-bottom:0.4rem;">
                    <strong style="font-size:0.85rem;color:var(--text-mid);">Name</strong>
                    <div id="profile-name"
                        style="font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--navy);font-weight:700;">
                        Loading&hellip;</div>
                </div>
                <div>
                    <strong style="font-size:0.85rem;color:var(--text-mid);">Email</strong>
                    <div id="profile-email" style="font-size:0.88rem;color:var(--text-body);">Loading&hellip;</div>
                </div>
            </div>

            <!-- Payment status card -->
            <div class="glass-card" style="padding:1.5rem;">
                <div
                    style="color:var(--sky);font-size:0.7rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.5rem;">
                    Payment Status</div>
                <div style="margin-bottom:0.6rem;">
                    <strong style="font-size:0.85rem;color:var(--text-mid);">Monthly Status</strong>
                    <div id="monthly-status"
                        style="font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--navy);font-weight:700;">
                        Loading&hellip;</div>
                </div>
                <div>
                    <strong style="font-size:0.85rem;color:var(--text-mid);">Dues Badge</strong>
                    <div id="payment-status" style="margin-top:0.3rem;">Loading&hellip;</div>
                </div>
            </div>

            <!-- Quick actions card -->
            <div class="glass-card" style="padding:1.5rem;background:var(--navy);">
                <div
                    style="color:rgba(255,255,255,0.5);font-size:0.7rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.5rem;">
                    Quick Actions</div>
                <button class="btn btn-primary" style="width:100%;"
                    onclick="alert('Payment gateway integration coming soon!')">Pay Dues Now</button>
            </div>
        </div>

        <!-- Monthly breakdown -->
        <div class="glass-card" style="padding:1.5rem;margin-top:1.25rem;">
            <div class="section-label" style="margin-bottom:1rem;">
                <h2 style="font-size:1.1rem;">Monthly Dues Breakdown</h2>
            </div>
            <!-- #monthly-grid preserved — dashboard.js injects .month-box divs here -->
            <div id="monthly-grid" class="user-month-grid">
                <div class="month-box">Loading&hellip;</div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/animations.js"></script>
    <!-- Mobile bottom navigation -->
    <nav class="mobile-bottom-nav" aria-label="Mobile navigation">
        <a href="index.html" class="mobile-nav-tab" data-page="index">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Home</span>
        </a>
        <a href="about.html" class="mobile-nav-tab" data-page="about">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span>About</span>
        </a>
        <a href="gallery.html" class="mobile-nav-tab" data-page="gallery">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <span>Gallery</span>
        </a>
        <a href="news.html" class="mobile-nav-tab" data-page="news">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <span>News</span>
        </a>
        <a href="login.html" class="mobile-nav-tab" data-page="login">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Login</span>
        </a>
    </nav>
    <script>
    (function() {
        var page = window.location.pathname.split('/').pop().replace('.html', '') || 'index';
        try {
            var tab = document.querySelector('.mobile-nav-tab[data-page="' + page + '"]');
            if (tab) tab.classList.add('active');
        } catch(e) {}
    })();
    </script>
</body>

</html>
