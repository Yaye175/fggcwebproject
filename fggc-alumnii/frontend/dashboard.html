<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni Dashboard | FGGC Gboko FCT-Chapter Alumni</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header>
        <div class="logo" style="display: flex; align-items: center;">
            <img src="images/logo.png" alt="FGGC Logo" style="height: 50px; margin-right: 15px; border-radius: 4px;">
            <a href="index.html" style="color: inherit; text-decoration: none;">FGGC Gboko FCT-Chapter Alumni</a>
        </div>
        <nav>
            <ul id="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="dashboard.html" class="active">Dashboard</a></li>
            </ul>
        </nav>
        <div class="auth-buttons" id="auth-links"></div>
    </header>

    <main>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1>My Dashboard</h1>
        </div>

        <div class="dashboard-grid">
            <!-- Profile Card -->
            <div class="card" style="border-top: 4px solid var(--primary-navy); display: flex; flex-direction: column; gap: 1rem;">
                <h3 class="card-title" style="margin-bottom: 0;">Profile Overview</h3>
                <div>
                    <strong>Name:</strong> <span id="profile-name">Loading...</span>
                </div>
                <div>
                    <strong>Email:</strong> <span id="profile-email">Loading...</span>
                </div>
                <div>
                    <strong>Monthly Status:</strong> <span id="monthly-status">Loading...</span>
                </div>
            </div>

            <!-- Dues Card -->
            <div class="card" style="border-top: 4px solid var(--secondary-yellow);">
                <h3 class="card-title">Annual Dues (<span id="current-year">2024</span>)</h3>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <span>Payment Status:</span>
                    <span id="payment-status">Loading...</span>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                    <span>Months Paid:</span>
                </div>
                <!-- This will be populated by JS -->
                <div id="monthly-grid" class="user-month-grid" style="margin-bottom: 1.5rem;">
                    <div class="month-box">Loading...</div>
                </div>
                <button class="btn btn-primary" style="width: 100%;"
                    onclick="alert('Payment gateway integration coming soon!')">Pay Dues Now</button>
            </div>
        </div>
    </main>

    <footer style="margin-top: auto;">
        <p>&copy; 2024 FGGC Alumni Association.</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
