<!DOCTYPE html>
<html lang="en">

<head>
    <script>try{var t=localStorage.getItem('fggc-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>News &amp; Archives | FGGC Gboko FCT Chapter</title>
    <meta name="description"
        content="Stay updated with the latest news, stories, and meeting minutes from the FGGC Gboko FCT Chapter Alumni Association.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <nav class="nav-pill nav-pill--light">
        <a href="index.html" class="nav-logo">
            <img src="images/logo.png" alt="FGGC Logo" class="nav-logo-img">
            FGGC Gboko Alumni FCT
        </a>
        <ul class="nav-links-list">
            <li><a href="index.html" class="nav-link">Home</a></li>
            <li><a href="about.html" class="nav-link">About</a></li>
            <li><a href="news.html" class="nav-link active">News</a></li>
            <li><a href="gallery.html" class="nav-link">Gallery</a></li>
        </ul>
        <div class="auth-buttons" id="auth-links"></div>
    </nav>

    <main>
        <div class="page-heading">
            <h1>News &amp; Archives</h1>
            <p>Stay informed with the latest updates and meeting records.</p>
        </div>

        <!-- Pill tabs — .news-tab and data-type preserved for JS -->
        <div class="pill-tabs">
            <button class="news-tab active" data-type="news">Latest News</button>
            <button class="news-tab" data-type="minutes">Meeting Minutes</button>
        </div>

        <!-- #news-container preserved — JS injects .news-item divs here -->
        <div class="news-list" id="news-container">
            <p>Loading&hellip;</p>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/animations.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tabs = document.querySelectorAll('.news-tab');
            const container = document.getElementById('news-container');

            const fetchNews = async (type) => {
                container.innerHTML = '<p>Loading&hellip;</p>';
                try {
                    const res = await api.get(`/news?type=${type}`);
                    if (res.length === 0) {
                        container.innerHTML = '<p>No items found.</p>';
                        return;
                    }
                    container.innerHTML = res.map(item => `
                        <div class="news-item" style="${item.videoUrl ? 'flex-direction:column;' : ''}">
                            ${item.videoUrl
                ? `<video src="${API_URL}${item.videoUrl}" controls style="width:100%;border-radius:8px;margin-bottom:0.75rem;"></video>`
                : item.imageData
                    ? `<img src="${item.imageData}" alt="News Image">`
                    : ''
            }
                            <div class="news-content">
                                <h3>${item.title}</h3>
                                <div class="news-date">${new Date(item.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' })}</div>
                                <p>${item.content.replace(/\n/g, '<br>')}</p>
                                ${item.documentData ? `
                                <a href="${item.documentData}"
                                   download="${item.documentName || 'document'}"
                                   class="btn btn-secondary"
                                   style="display:inline-flex;align-items:center;gap:0.4rem;margin-top:0.75rem;font-size:0.82rem;">
                                    &#128196; Download ${item.documentName || 'document'}
                                </a>` : ''}
                            </div>
                        </div>
                    </div>
                `).join('');
                } catch (e) {
                    console.error(e);
                    container.innerHTML = '<p>Failed to load data. Please try again later.</p>';
                }
            };

            tabs.forEach(tab => {
                tab.addEventListener('click', (e) => {
                    tabs.forEach(t => t.classList.remove('active'));
                    e.target.classList.add('active');
                    fetchNews(e.target.dataset.type);
                });
            });

            fetchNews('news');
        });
    </script>
    <!-- Mobile bottom navigation -->
    <nav class="mobile-bottom-nav" aria-label="Mobile navigation">

            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Home</span>
        </a>
        <a href="about.html" class="mobile-nav-tab" data-page="about">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span>About</span>
        </a>
        <a href="gallery.html" class="mobile-nav-tab" data-page="gallery">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <span>Gallery</span>
        </a>
        <a href="news.html" class="mobile-nav-tab" data-page="news">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <span>News</span>

        <a href="login.html" class="mobile-nav-tab" data-page="login">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Login</span>
        </a>
    </nav>
    <script>
    (function() {
        var page = window.location.pathname.split('/').pop().replace('.html', '') || 'index';
        try {
            var tab = document.querySelector('.mobile-nav-tab[data-page="' + page + '"]');
            if (tab) tab.classList.add('active');
        } catch(e) {}
    })();
    </script>
</body>

</html>
