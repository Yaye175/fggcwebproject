<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FGGC Gboko FCT Chapter Alumni</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- Full dark hero background -->
    <div class="page-hero" style="min-height:100vh;display:flex;flex-direction:column;">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>

        <!-- Dark nav — minimal (just logo + sign up) -->
        <nav class="nav-pill nav-pill--dark">
            <a href="index.html" class="nav-logo">
                <img src="images/logo.png" alt="FGGC Logo" class="nav-logo-img">
                FGGC Gboko Alumni FCT</a>
            <div class="auth-buttons" id="auth-links"></div>
        </nav>

        <!-- Centred form card -->
        <div
            style="flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative;z-index:2;">
            <div class="glass-card--dark form-container--dark">
                <h2 style="margin-bottom:0.3rem;">Welcome Back</h2>
                <p style="color:rgba(255,255,255,0.5);font-size:0.85rem;margin-bottom:1.5rem;">Sign in to your alumni
                    account</p>

                <p id="error-message"
                    style="color:#ff8a80;text-align:center;margin-bottom:0.85rem;font-size:0.88rem;min-height:1.2em;">
                </p>

                <form id="login-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="password" style="display:flex; justify-content:space-between;">
                            <span>Password</span>
                            <a href="forgot-password.html"
                                style="font-weight: normal; color:var(--sky); text-decoration:none;">Forgot?</a>
                        </label>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem;">Login
                        &rarr;</button>
                </form>

                <p style="text-align:center;margin-top:1.25rem;font-size:0.85rem;color:rgba(255,255,255,0.45);">
                    Don&rsquo;t have an account? <a href="signup.html" style="color:var(--sky);">Sign up here</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/animations.js"></script>
    <!-- Mobile bottom navigation -->
    <nav class="mobile-bottom-nav">
        <a href="index.html" class="mobile-nav-tab" data-page="index">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Home</span>
        </a>
        <a href="about.html" class="mobile-nav-tab" data-page="about">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span>About</span>
        </a>
        <a href="gallery.html" class="mobile-nav-tab" data-page="gallery">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <span>Gallery</span>
        </a>
        <a href="news.html" class="mobile-nav-tab" data-page="news">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <span>News</span>
        </a>
        <a href="login.html" class="mobile-nav-tab" data-page="login">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Login</span>
        </a>
    </nav>
    <script>
    (function() {
        var page = window.location.pathname.split('/').pop().replace('.html', '') || 'index';
        var tab = document.querySelector('.mobile-nav-tab[data-page="' + page + '"]');
        if (tab) tab.classList.add('active');
    })();
    </script>
</body>

</html>
