<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FGGC Alumni</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header>
        <div class="logo"><a href="index.html" style="color: inherit; text-decoration: none;">FGGC Alumni</a></div>
        <nav>
            <ul id="nav-links">
                <li><a href="index.html">Home</a></li>
            </ul>
        </nav>
    </header>

    <main style="display: flex; align-items: center; justify-content: center;">
        <div class="form-container" style="width: 100%;">
            <h2 style="text-align: center; margin-bottom: 1.5rem;">Welcome Back</h2>
            <p id="error-message" style="color: var(--danger-red); text-align: center; margin-bottom: 1rem;"></p>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
            </form>

            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
                Don't have an account? <a href="signup.html">Sign up here</a>
            </p>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Check for success message from signup
        if (window.location.search.includes('success=true')) {
            const errDiv = document.getElementById('error-message');
            errDiv.style.color = 'var(--accent-green)';
            errDiv.textContent = 'Account created successfully! Please log in.';
        }
    </script>
</body>

</html>
