<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FGGC Gboko FCT Chapter Alumni</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- Full dark hero background -->
    <div class="page-hero" style="min-height:100vh;display:flex;flex-direction:column;">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>

        <!-- Dark nav — minimal (just logo + sign up) -->
        <nav class="nav-pill nav-pill--dark">
            <a href="index.html" class="nav-logo">
                <img src="images/logo.png" alt="FGGC Logo" class="nav-logo-img">
                FGGC Gboko Alumni FCT</a>
            <div class="auth-buttons" id="auth-links"></div>
        </nav>

        <!-- Centred form card -->
        <div
            style="flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative;z-index:2;">
            <div class="glass-card--dark form-container--dark">
                <h2 style="margin-bottom:0.3rem;">Welcome Back</h2>
                <p style="color:rgba(255,255,255,0.5);font-size:0.85rem;margin-bottom:1.5rem;">Sign in to your alumni
                    account</p>

                <p id="error-message"
                    style="color:#ff8a80;text-align:center;margin-bottom:0.85rem;font-size:0.88rem;min-height:1.2em;">
                </p>

                <form id="login-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="password" style="display:flex; justify-content:space-between;">
                            <span>Password</span>
                            <a href="forgot-password.html"
                                style="font-weight: normal; color:var(--sky); text-decoration:none;">Forgot?</a>
                        </label>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem;">Login
                        &rarr;</button>
                </form>

                <p style="text-align:center;margin-top:1.25rem;font-size:0.85rem;color:rgba(255,255,255,0.45);">
                    Don&rsquo;t have an account? <a href="signup.html" style="color:var(--sky);">Sign up here</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/animations.js"></script>
</body>

</html>
